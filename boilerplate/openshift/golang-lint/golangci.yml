version: "2"
run:
  concurrency: 10
  # Only check new code, not existing issues
  # This uses git to compare against the base branch (typically master/main)
  new: true
  # Alternatively, you can specify a specific revision:
  # new-from-rev: origin/master
linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    misspell:
      extra-words:
        - typo: openshit
          correction: OpenShift
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party/
      - builtin/
      - examples/
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party/
      - builtin/
      - examples/
